{% extends "shop/base.html" %}
{% load i18n %}

{% block content %}
<div class="container py-5" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <h2 class="text-center mb-4">{% trans "Yeni Hesap Oluştur" %}</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">{% trans "Kayıt Ol" %}</button>
                </form>
                <div class="text-center mt-3">
                    <small>{% trans "Zaten hesabınız var mı?" %} <a href="{% url 'login' %}">{% trans "Giriş Yap" %}</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
