{% extends "shop/base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4" style="border-radius: 15px;">
                <h3 class="text-center fw-bold mb-4 text-uppercase lang-content" 
                    data-tr="KULLANICI GİRİŞİ" 
                    data-en="USER LOGIN">KULLANICI GİRİŞİ</h3>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-dark w-100 py-2 rounded-0 fw-bold">GİRİŞ YAP</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
